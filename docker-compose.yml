services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: bambu
      POSTGRES_PASSWORD: bambu_dev
      POSTGRES_DB: bambu
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bambu"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
